<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <title>AI Content Generator Pro</title>
  <style>
    :root { --bg: #0b1120; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6; --border: #334155; }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; overflow:hidden; }
    
    /* Header Navigation */
    .tabs { height: 65px; width: 100%; background: #0f172a; border-bottom: 1px solid var(--border); display: flex; align-items: center; padding: 0 20px; gap: 10px; flex-shrink: 0; }
    .tab { padding: 8px 20px; cursor: pointer; border-radius: 8px; font-weight: 700; color: #94a3b8; transition: 0.2s; border-bottom: 3px solid transparent; }
    .tab.active { color: #fff; background: #1e293b; border-bottom-color: var(--accent); }

    .content-area { flex: 1; padding: 20px; overflow-y: auto; background: radial-gradient(circle at top left,#172554 0,#0b1120 40%); }
    .tab-content { display: none; max-width: 1300px; margin: 0 auto; width: 100%; }
    .tab-content.active { display: block; }
    
    .card { background: rgba(30,41,59,.95); border: 1px solid #334155; border-radius: 16px; padding: 22px; margin-bottom: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 6px; font-size: 13px; font-weight: 600; color: #cbd5e1; }
    
    input, textarea, select { width: 100%; background: #020617; border: 1px solid #475569; border-radius: 10px; padding: 12px; color: white; font-size: 14px; outline:none; }
    input:focus, textarea:focus { border-color: var(--accent); }
    .password-mask { -webkit-text-security: disc !important; }

    button { background: linear-gradient(135deg,#2563eb,#7c3aed); color: white; border: none; padding: 12px 24px; border-radius: 10px; cursor: pointer; font-weight: 700; transition: 0.2s; }
    button:hover { transform: translateY(-1px); filter: brightness(1.1); }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    button.secondary { background: #475569; }

    /* Results Layout */
    .results-container { display: flex; gap: 20px; margin-top: 20px; min-height: 500px; border-top: 1px solid var(--border); padding-top: 20px; }
    .results-sidebar { width: 320px; flex-shrink: 0; background: rgba(15,23,42,0.5); border-radius: 12px; padding: 15px; border: 1px solid #334155; overflow-y: auto; max-height: 650px; }
    .results-main { flex: 1; min-width: 0; }
    
    .result-item-btn { width: 100%; text-align: left; background: #0f172a; border: 1px solid #334155; color: #cbd5e1; padding: 12px 15px; border-radius: 8px; margin-bottom: 8px; cursor: pointer; font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .result-item-btn.active { background: #2563eb; color: white; border-color: #60a5fa; }
    .result-item-btn .item-num { font-weight: 800; margin-right: 8px; opacity: 0.6; }

    .output-box { background: #010409; border: 1px solid var(--accent); padding: 20px; border-radius: 12px; white-space: pre-wrap; font-family: 'Consolas', monospace; font-size: 14px; line-height: 1.6; min-height: 400px; color: #e2e8f0; overflow-y: auto; }
    .char-counter { display: inline-block; background: #0ea5e9; color: #fff; font-size: 12px; font-weight: 800; padding: 4px 12px; border-radius: 99px; margin-bottom: 10px; }
    
    .progress-container { width: 100%; height: 6px; background: #1e293b; border-radius: 10px; margin: 15px 0; overflow: hidden; display: none; }
    .progress-bar { height: 100%; background: linear-gradient(90deg, #3b82f6, #8b5cf6); width: 0%; transition: width 0.3s; }
    .error-detail { background: #450a0a; border: 1px solid #991b1b; color: #fecaca; padding: 12px; border-radius: 8px; margin-top: 15px; display: none; font-size: 13px; font-family: monospace; white-space: pre-wrap; }
  </style>
</head>
<body>

<div class="tabs">
  <div style="font-size:18px; font-weight:900; color:#fff; margin-right:30px;">AI CONTENT PRO</div>
  <div class="tab active" onclick="showTab(1)">Cấu hình Bot</div>
  <div class="tab" onclick="showTab(2)">Sáng tạo nội dung</div>
  <div class="tab" onclick="showTab(3)">Viết lại</div>
</div>

<div class="content-area">
  <!-- TAB 1 -->
  <div id="tab1" class="tab-content active">
    <div class="card">
      <h3>Danh sách Chatbot đã lưu</h3>
      <div id="botList"></div>
    </div>
    <div class="card">
      <h3>Thiết lập Chatbot Mới</h3>
      <div class="form-group">
        <label>Tên Gợi Nhớ</label>
        <input type="text" id="botName" placeholder="Ví dụ: Bot SEO, Bot TikTok...">
      </div>
      <div class="form-group">
        <label>Loại API</label>
        <div style="display:flex; gap:15px; background:#0f172a; padding:10px; border-radius:8px;">
          <label style="color:#fff; cursor:pointer;"><input type="radio" name="botApiType" value="gateway" checked onchange="toggleBotApiInputs()"> Gateway</label>
          <label style="color:#fff; cursor:pointer;"><input type="radio" name="botApiType" value="gemini" onchange="toggleBotApiInputs()"> Gemini Direct</label>
          <label style="color:#fff; cursor:pointer;"><input type="radio" name="botApiType" value="vertex" onchange="toggleBotApiInputs()"> Vertex OAuth</label>
          <label style="color:#fff; cursor:pointer;"><input type="radio" name="botApiType" value="openai" onchange="toggleBotApiInputs()"> OpenAI</label>
        </div>
      </div>
      <div id="botGatewayGroup">
        <div class="form-group">
          <label>Gateway Base URL</label>
          <input type="text" id="botBaseUrl" value="https://fisher-fare-wiley-travelling.trycloudflare.com">
        </div>
        <div class="form-group">
          <label>API Keys</label>
          <textarea id="botApiKeysGateway" class="password-mask" rows="2"></textarea>
        </div>
      </div>
      <div id="botGeminiGroup" style="display:none">
        <div class="form-group">
          <label>Gemini Base URL</label>
          <input type="text" id="botGeminiBaseUrl" value="https://generativelanguage.googleapis.com">
        </div>
        <div class="form-group">
          <label>Gemini API Keys</label>
          <textarea id="botApiKeysGemini" class="password-mask" rows="2"></textarea>
        </div>
      </div>
      <div id="botVertexGroup" style="display:none">
        <div class="form-group">
          <label>Service Account JSON</label>
          <input type="text" id="botServiceAccountPath" readonly>
          <button class="secondary" style="margin-top:5px" onclick="pickServiceAccount()">Chọn File</button>
        </div>
      </div>
      <div id="botOpenAIGroup" style="display:none">
        <div class="form-group">
          <label>OpenAI Base URL</label>
          <input type="text" id="botOpenAIBaseUrl" value="https://api.openai.com">
        </div>
        <div class="form-group">
          <label>OpenAI API Keys</label>
          <textarea id="botApiKeysOpenAI" class="password-mask" rows="2"></textarea>
        </div>
      </div>
      <div class="form-group">
        <label>Model ID</label>
        <select id="botModel"></select>
      </div>
      <div class="form-group">
        <label>System Instruction</label>
        <textarea id="systemInstruction" rows="4"></textarea>
      </div>
      <button id="saveBotBtn" onclick="addBot()">Lưu Chatbot</button>
      <button class="secondary" onclick="clearBotForm()">Hủy / Tạo mới</button>
    </div>
  </div>

  <!-- TAB 2 -->
  <div id="tab2" class="tab-content">
    <div class="card">
      <h3>Sáng tạo nội dung hàng loạt</h3>
      <div style="display: flex; gap: 20px; align-items: flex-end; margin-bottom: 15px;">
        <div class="form-group" style="flex: 1; margin-bottom: 0;">
          <label>Chọn Chatbot</label>
          <select id="botSelectMain"></select>
        </div>
        <div class="form-group" style="width: 300px; margin-bottom: 0;">
          <label>Độ dài (Ký tự)</label>
          <div style="display: flex; gap: 8px; align-items: center;">
            <input type="number" id="minChars" value="500" placeholder="Từ" style="padding: 8px;">
            <span style="color: #94a3b8;">-</span>
            <input type="number" id="maxChars" value="1000" placeholder="Đến" style="padding: 8px;">
          </div>
        </div>
      </div>
      <div class="form-group">
        <label>Danh sách tiêu đề (mỗi dòng 1 tiêu đề)</label>
        <textarea id="topic" rows="5" placeholder="Tiêu đề 1..."></textarea>
      </div>
      <div class="form-group">
        <label>Yêu cầu thêm</label>
        <textarea id="requirements" rows="3" placeholder="Ví dụ: Giọng văn hài hước, phân tích chuyên sâu, chèn thêm các từ khóa SEO..."></textarea>
      </div>
      <button id="generateBtn" onclick="generateContent()">🚀 Bắt đầu tạo nội dung</button>
      
      <div id="genProgressWrap" class="progress-container">
        <div id="genProgressBar" class="progress-bar"></div>
      </div>
      <div id="genError" class="error-detail"></div>
      
      <div class="results-container">
        <div id="resultTabs" class="results-sidebar">
          <p style="color:#64748b; font-size:12px">Chưa có kết quả.</p>
        </div>
        <div class="results-main">
          <div id="tab2OutputWrap" style="display:none">
            <div class="char-counter" id="counterTab2">0 ký tự</div>
            <div id="outputTab2" class="output-box"></div>
            <div style="margin-top:15px; display:flex; gap:10px;">
              <button class="btn-primary" onclick="regenerateActiveTitle()">🔄 Tạo lại tiêu đề này</button>
              <button class="secondary" onclick="copyOutput('outputTab2')">📋 Copy</button>
              <button class="secondary" onclick="downloadActiveResult()">💾 Tải .txt</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- TAB 3 -->
  <div id="tab3" class="tab-content">
    <div class="card">
      <h3>Viết lại nội dung</h3>
      <div class="form-group">
        <label>Chọn Chatbot</label>
        <select id="selectBotTab3"></select>
      </div>
      <div class="form-group">
        <label>Nội dung gốc</label>
        <textarea id="originalContent" rows="8"></textarea>
      </div>
      <div class="form-group">
        <label>Yêu cầu viết lại</label>
        <textarea id="rewriteRequirements" rows="2"></textarea>
      </div>
      <button onclick="rewriteContent()">♻️ Bắt đầu viết lại</button>
      <div class="output-wrap" style="margin-top:20px">
        <div class="char-counter" id="counterTab3">0 ký tự</div>
        <div id="outputTab3" class="output-box"></div>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
