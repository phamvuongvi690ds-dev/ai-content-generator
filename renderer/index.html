<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>AI Content Generator</title>
  <style>
    :root { --bg: #0f172a; --card: #1e293b; --text: #f1f5f9; --accent: #3b82f6; --border: #334155; }
    body { font-family: -apple-system, system-ui, sans-serif; background: var(--bg); color: var(--text); margin: 0; display: flex; flex-direction: column; height: 100vh; }
    .tabs { display: flex; background: var(--card); border-bottom: 1px solid var(--border); }
    .tab { padding: 15px 25px; cursor: pointer; border-bottom: 2px solid transparent; transition: 0.2s; font-weight: 500; }
    .tab:hover { background: #2d3a4f; }
    .tab.active { border-bottom-color: var(--accent); color: var(--accent); }
    .content-area { flex: 1; padding: 20px; overflow-y: auto; }
    .tab-content { display: none; max-width: 900px; margin: 0 auto; }
    .tab-content.active { display: block; }
    .card { background: var(--card); border: 1px solid var(--border); border-radius: 12px; padding: 20px; margin-bottom: 20px; }
    .form-group { margin-bottom: 15px; }
    label { display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8; }
    input, textarea, select { width: 100%; background: #0f172a; border: 1px solid var(--border); border-radius: 6px; padding: 10px; color: white; box-sizing: border-box; font-size: 14px; }
    textarea { resize: vertical; min-height: 80px; }
    button { background: var(--accent); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: 500; }
    button:hover { filter: brightness(1.1); }
    button.secondary { background: #475569; }
    .bot-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid var(--border); }
    .output-box { background: #020617; border: 1px solid var(--accent); padding: 15px; border-radius: 8px; white-space: pre-wrap; margin-top: 15px; min-height: 100px; }
    .range-group { display: flex; gap: 10px; align-items: center; }
    .range-group input { width: 100px; }
    .api-options { display: flex; gap: 15px; margin-bottom: 15px; background: #0f172a; padding: 10px; border-radius: 8px; border: 1px solid var(--border); }
    .api-options label { display: flex; align-items: center; gap: 5px; cursor: pointer; color: white; margin-bottom: 0; }
    .api-options input { width: auto; }
  </style>
</head>
<body>

<div class="tabs">
  <div class="tab active" onclick="showTab(1)">Tab 1: Cấu hình</div>
  <div class="tab" onclick="showTab(2)">Tab 2: Sáng tạo</div>
  <div class="tab" onclick="showTab(3)">Tab 3: Viết lại</div>
</div>

<div class="content-area">
  <div id="tab1" class="tab-content active">
    <div class="card">
      <h3>Loại API Sử Dụng</h3>
      <div class="api-options">
        <label><input type="radio" name="apiType" value="gateway" checked onchange="toggleApiInputs()"> Vertex Gateway</label>
        <label><input type="radio" name="apiType" value="gemini" onchange="toggleApiInputs()"> Gemini API Direct</label>
        <label><input type="radio" name="apiType" value="vertex" onchange="toggleApiInputs()"> Vertex AI (OAuth)</label>
        <label><input type="radio" name="apiType" value="openai" onchange="toggleApiInputs()"> ChatGPT / OpenAI</label>
      </div>

      <div id="groupGateway">
        <div class="form-group">
          <label>Vertex Gateway Base URL</label>
          <input type="text" id="baseUrl" placeholder="https://answers-name-theology-ruling.trycloudflare.com">
        </div>
        <div class="form-group">
          <label>Gateway API Keys — mỗi dòng 1 key, tự xoay vòng mỗi lượt gọi</label>
          <textarea id="apiKeysGateway" placeholder="key_1
key_2
key_3"></textarea>
        </div>
      </div>

      <div id="groupGemini" style="display:none">
        <div class="form-group">
          <label>Gemini Base URL</label>
          <input type="text" id="geminiBaseUrl" placeholder="https://generativelanguage.googleapis.com">
        </div>
        <div class="form-group">
          <label>Gemini API Keys — mỗi dòng 1 key, tự xoay vòng mỗi lượt gọi</label>
          <textarea id="apiKeysGemini" placeholder="AIza...
AIza...
AIza..."></textarea>
        </div>
      </div>

      <div id="groupVertex" style="display:none">
        <div class="form-group">
          <label>Service Account JSON File</label>
          <div style="display:flex; gap:10px">
            <input type="text" id="serviceAccountPath" readonly placeholder="Chọn file JSON từ Google Cloud">
            <button onclick="pickServiceAccount()" class="secondary" style="white-space:nowrap">Chọn File</button>
          </div>
        </div>
      </div>

      <div id="groupOpenAI" style="display:none">
        <div class="form-group">
          <label>OpenAI Base URL</label>
          <input type="text" id="openaiBaseUrl" placeholder="https://api.openai.com">
        </div>
        <div class="form-group">
          <label>OpenAI / ChatGPT API Keys — mỗi dòng 1 key, tự xoay vòng mỗi lượt gọi</label>
          <textarea id="apiKeysOpenAI" placeholder="sk-...
sk-...
sk-..."></textarea>
        </div>
      </div>
      
      <button onclick="saveGlobalConfig()">Lưu cấu hình API</button>
    </div>

    <div class="card">
      <h3>Thêm Chatbot</h3>
      <div class="form-group">
        <label>Tên Bot</label>
        <input type="text" id="botName" placeholder="Ví dụ: Copywriter">
      </div>
      <div class="form-group">
        <label>Model ID</label>
        <input type="text" id="botModel" placeholder="gemini-2.5-flash">
      </div>
      <div class="form-group">
        <label>System Instruction</label>
        <textarea id="systemInstruction" placeholder="Chỉ dẫn của Gemini..."></textarea>
      </div>
      <button onclick="addBot()">Lưu Chatbot</button>
    </div>

    <div class="card">
      <h3>Danh sách Chatbot</h3>
      <div id="botList"></div>
    </div>
  </div>

  <div id="tab2" class="tab-content">
    <div class="card">
      <h3>Sáng tạo nội dung mới</h3>
      <div class="form-group">
        <label>Chọn Chatbot</label>
        <select id="selectBotTab2"></select>
      </div>
      <div class="form-group">
        <label>Độ dài (Ký tự)</label>
        <div class="range-group">
          Từ <input type="number" id="minChars" value="500"> 
          đến <input type="number" id="maxChars" value="1000">
        </div>
      </div>
      <div class="form-group">
        <label>Tiêu đề / Chủ đề</label>
        <input type="text" id="topic" placeholder="Nhập tiêu đề hoặc chủ đề">
      </div>
      <div class="form-group">
        <label>Yêu cầu cụ thể</label>
        <textarea id="requirements" placeholder="Nhập yêu cầu chi tiết..."></textarea>
      </div>
      <button id="generateBtn" onclick="generateContent()">Bắt đầu sáng tạo</button>
      <div id="outputTab2" class="output-box">Kết quả...</div>
    </div>
  </div>

  <div id="tab3" class="tab-content">
    <div class="card">
      <h3>Viết lại nội dung</h3>
      <div class="form-group">
        <label>Chọn Chatbot</label>
        <select id="selectBotTab3"></select>
      </div>
      <div class="form-group">
        <label>Nội dung gốc</label>
        <textarea id="originalContent" style="min-height: 150px;" placeholder="Dán nội dung vào đây..."></textarea>
      </div>
      <div class="form-group">
        <label>Yêu cầu viết lại</label>
        <textarea id="rewriteRequirements" placeholder="Hài hước, chuyên nghiệp, ngắn gọn..."></textarea>
      </div>
      <button id="rewriteBtn" onclick="rewriteContent()">Bắt đầu viết lại</button>
      <div id="outputTab3" class="output-box">Nội dung mới...</div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
